<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hero">
        <div class="selector">
            <div id="selectField">
                <p>Select a social media platform:</p>
                <img src="SelectMenu_Img/arrow.png" alt="Arrow">
            </div>

            <ul id="list">
                <li class="optiona">
                    <img src="SelectMenu_Img/facebook.png">
                    <p> Facebook</p>
                </li>
                <li class="optiona">
                    <img src="SelectMenu_Img/instagram.png">
                    <p> Instagram</p>
                </li>
                <li class="optiona">
                    <img src="SelectMenu_Img/pinterest.png">
                    <p> Pinterest</p>
                </li>
                <li class="optiona">
                    <img src="SelectMenu_Img/twitter.png">
                    <p> Twitter</p>
                </li>
                <li class="optiona">
                    <img src="SelectMenu_Img/whatsapp.png">
                    <p> Whatsapp</p>
                </li>
                <li class="optiona">
                    <img src="SelectMenu_Img/youtube.png">
                    <p> youtube</p>
                </li>

            </ul>
        </div>
    </div>
</body>
</html>
