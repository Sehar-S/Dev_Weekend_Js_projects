<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Calculator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator">
  <div class="display">
    <div class="prev" id="prevDisplay"></div>
    <div class="current" id="display">0</div>
  </div>

  <div class="buttons">
    <button class="btn func" data-action="clear">AC</button>
    <button class="btn func" data-action="sign">+/-</button>
    <button class="btn func" data-value="%">%</button>
    <button class="btn op" data-value="/">÷</button>

    <button class="btn num" data-value="7">7</button>
    <button class="btn num" data-value="8">8</button>
    <button class="btn num" data-value="9">9</button>
    <button class="btn op" data-value="*">×</button>

    <button class="btn num" data-value="4">4</button>
    <button class="btn num" data-value="5">5</button>
    <button class="btn num" data-value="6">6</button>
    <button class="btn op" data-value="-">−</button>

    <button class="btn num" data-value="1">1</button>
    <button class="btn num" data-value="2">2</button>
    <button class="btn num" data-value="3">3</button>
    <button class="btn op" data-value="+">+</button>

    <button class="btn num zero" data-value="0">0</button>
    <button class="btn num" data-value=".">.</button>
    <button class="btn equals" data-action="equals">=</button>
  </div>
</div>

<script>
const display = document.getElementById("display");
const prevDisplay = document.getElementById("prevDisplay");
const buttons = document.querySelectorAll(".btn");

let expression = "";

function updateDisplay() {
  display.textContent = expression === "" ? "0" : expression;
}

buttons.forEach((btn) => {
  btn.addEventListener("click", () => {
    const action = btn.dataset.action;
    const value = btn.dataset.value;

    if (action === "clear") {
      expression = "";
      prevDisplay.textContent = "";
    } else if (action === "sign") {
      if (expression !== "") expression = String(-parseFloat(expression) || expression);
    } else if (action === "equals") {
      prevDisplay.textContent = expression + " =";
      try {
        expression = String(eval(expression.replace(/×/g, "*")));
      } catch {
        expression = "Error";
      }
    } else {
      expression += value;
    }

    updateDisplay();
  });
});
</script>
</body>
</html>
