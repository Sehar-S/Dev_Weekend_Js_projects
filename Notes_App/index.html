<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Notes App</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <div class="header">
    <h2>My Notes</h2>
    <p class="subtitle">Quick notes, saved automatically</p>
  </div>

  <div class="input-area">
    <input type="text" id="titleInput" placeholder="Note title">
    <textarea id="contentInput" placeholder="Write something..."></textarea>
    <button id="addBtn">Add Note</button>
  </div>

  <div class="notes-grid" id="notesGrid"></div>

  <p class="empty-msg" id="emptyMsg">No notes yet. Add your first one above.</p>
</div>

<script>
const titleInput = document.getElementById("titleInput");
const contentInput = document.getElementById("contentInput");
const addBtn = document.getElementById("addBtn");
const notesGrid = document.getElementById("notesGrid");
const emptyMsg = document.getElementById("emptyMsg");

let notes = JSON.parse(localStorage.getItem("notes")) || [];

function saveNotes() {
  localStorage.setItem("notes", JSON.stringify(notes));
}

function renderNotes() {
  notesGrid.innerHTML = "";

  if (notes.length === 0) {
    emptyMsg.style.display = "block";
    return;
  }

  emptyMsg.style.display = "none";

  notes.forEach((note, index) => {
    const card = document.createElement("div");
    card.classList.add("note-card");

    const titleEl = document.createElement("h3");
    titleEl.textContent = note.title;

    const contentEl = document.createElement("p");
    contentEl.textContent = note.content;

    const deleteBtn = document.createElement("button");
    deleteBtn.classList.add("delete-btn");
    deleteBtn.innerHTML = "&times;";
    deleteBtn.addEventListener("click", () => {
      notes.splice(index, 1);
      saveNotes();
      renderNotes();
    });

    card.appendChild(deleteBtn);
    card.appendChild(titleEl);
    card.appendChild(contentEl);
    notesGrid.appendChild(card);
  });
}

addBtn.addEventListener("click", () => {
  const title = titleInput.value.trim();
  const content = contentInput.value.trim();

  if (title === "" && content === "") {
    return;
  }

  notes.unshift({
    title: title === "" ? "Untitled" : title,
    content: content
  });

  titleInput.value = "";
  contentInput.value = "";

  saveNotes();
  renderNotes();
});

renderNotes();
</script>
</body>
</html>
